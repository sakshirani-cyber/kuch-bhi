<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="card">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  </div>
  <h1>Edit Profile</h1>
  <div class="welcome">Logged in as <span id="currentUsernameLabel"></span></div>

  <div class="field-group">
    <label for="currentPassword">Current Password (required for every change below)</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="currentPassword" required>
    </div>
  </div>

  <hr class="divider">

  <p class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Username
  </p>
  <div class="update-row">
    <div class="field-group">
      <input type="text" id="newUsername" placeholder="New username"
             minlength="3" maxlength="20" pattern="^[a-zA-Z0-9._]{3,20}$">
    </div>
    <button type="button" id="updateUsernameBtn" disabled>
      <span class="spinner"></span>
      <span class="btn-label">Update</span>
    </button>
  </div>

  <p class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Password
  </p>
  <div class="update-row">
    <div class="field-group">
      <input type="password" id="newPassword" placeholder="New password"
             pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@#$%^&amp;+=!]).{8,13}$">
    </div>
    <button type="button" id="updatePasswordBtn" disabled>
      <span class="spinner"></span>
      <span class="btn-label">Update</span>
    </button>
  </div>
  <p class="hint">8-13 chars, 1 uppercase, 1 lowercase, 1 digit, 1 special (@#$%^&amp;+=!)</p>

  <p class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>
    Email
  </p>
  <div class="update-row">
    <div class="field-group">
      <input type="email" id="newEmail" placeholder="New email">
    </div>
    <button type="button" id="updateEmailBtn" disabled>
      <span class="spinner"></span>
      <span class="btn-label">Update</span>
    </button>
  </div>

  <p class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    Phone Number
  </p>
  <div class="update-row">
    <div class="field-group">
      <input type="text" id="newPhoneNumber" placeholder="New phone number"
             pattern="^[0-9]{10}$" maxlength="10">
    </div>
    <button type="button" id="updatePhoneBtn" disabled>
      <span class="spinner"></span>
      <span class="btn-label">Update</span>
    </button>
  </div>

  <button class="logout" id="logoutBtn">
    <span class="spinner"></span>
    <span class="btn-label">Log Out</span>
  </button>

  <div class="danger-zone">
    <p class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><path d="M12 9v4M12 17h.01"/></svg>
      Danger Zone
    </p>
    <p>Deleting your account is permanent and cannot be undone.</p>
    <button class="danger" id="deleteBtn" disabled>
      <span class="spinner"></span>
      <span class="btn-label">Delete My Account</span>
    </button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script src="js/common.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
