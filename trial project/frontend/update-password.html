<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2>User Dashboard</h2>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="update-username.html">Update Username</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h2>Update Password</h2>
        <div id="message"></div>

        <form id="passwordForm" novalidate>
            <div class="form-group">
                <label for="currentPassword">Current Password <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="password" id="currentPassword" name="currentPassword"
                       placeholder="Enter Current Password" minlength="8" maxlength="20"
                       autocomplete="current-password" required
                       aria-describedby="currentPasswordHint currentPasswordError">
                <span class="field-hint" id="currentPasswordHint">8–20 chars, uppercase, lowercase, number &amp; special character</span>
                <span class="field-error" id="currentPasswordError" role="alert"></span>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="password" id="newPassword" name="newPassword"
                       placeholder="Enter New Password" minlength="8" maxlength="20"
                       autocomplete="new-password" required
                       aria-describedby="newPasswordHint newPasswordError">
                <span class="field-hint" id="newPasswordHint">8–20 chars, uppercase, lowercase, number &amp; special character</span>
                <span class="field-error" id="newPasswordError" role="alert"></span>
            </div>

            <button id="updateBtn" type="submit" class="btn" disabled>Update Password</button>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/update-password.js"></script>

</body>
</html>
