<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Username</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2>User Dashboard</h2>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="update-password.html">Update Password</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h2>Update Username</h2>
        <div id="message"></div>

        <form id="usernameForm" novalidate>
            <div class="form-group">
                <label for="currentUsername">Current Username <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="text" id="currentUsername" name="currentUsername"
                       placeholder="Enter Current Username" minlength="3" maxlength="50"
                       autocomplete="username" required
                       aria-describedby="currentUsernameHint currentUsernameError">
                <span class="field-hint" id="currentUsernameHint">3–50 characters</span>
                <span class="field-error" id="currentUsernameError" role="alert"></span>
            </div>

            <div class="form-group">
                <label for="newUsername">New Username <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="text" id="newUsername" name="newUsername"
                       placeholder="Enter New Username" minlength="3" maxlength="50"
                       autocomplete="nickname" required
                       aria-describedby="newUsernameHint newUsernameError">
                <span class="field-hint" id="newUsernameHint">3–50 characters</span>
                <span class="field-error" id="newUsernameError" role="alert"></span>
            </div>

            <button id="updateBtn" type="submit" class="btn" disabled>Update Username</button>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/update-username.js"></script>

</body>
</html>
