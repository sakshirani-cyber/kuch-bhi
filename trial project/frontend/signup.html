<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Create Account</h2>
        <div id="message"></div>

        <form id="signupForm" novalidate>
            <div class="form-group">
                <label for="username">Username <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="text" id="username" name="username" placeholder="Enter Username"
                       minlength="3" maxlength="50" autocomplete="username" required
                       aria-describedby="usernameHint usernameError">
                <span class="field-hint" id="usernameHint">3–50 characters</span>
                <span class="field-error" id="usernameError" role="alert"></span>
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter Email"
                       maxlength="100" autocomplete="email" required
                       aria-describedby="emailHint emailError">
                <span class="field-hint" id="emailHint">Valid email address</span>
                <span class="field-error" id="emailError" role="alert"></span>
            </div>

            <div class="form-group">
                <label for="contactNumber">Contact Number <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="text" id="contactNumber" name="contactNumber" placeholder="10-digit Contact Number"
                       inputmode="numeric" pattern="\d{10}" maxlength="10" required
                       aria-describedby="contactNumberHint contactNumberError">
                <span class="field-hint" id="contactNumberHint">Exactly 10 digits</span>
                <span class="field-error" id="contactNumberError" role="alert"></span>
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Date of Birth <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="date" id="dateOfBirth" name="dateOfBirth" required
                       aria-describedby="dateOfBirthHint dateOfBirthError">
                <span class="field-hint" id="dateOfBirthHint">Must be a past date</span>
                <span class="field-error" id="dateOfBirthError" role="alert"></span>
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required-mark" aria-hidden="true">*</span></label>
                <input type="password" id="password" name="password" placeholder="Enter Password"
                       minlength="8" maxlength="20" autocomplete="new-password" required
                       aria-describedby="passwordHint passwordError">
                <span class="field-hint" id="passwordHint">8–20 chars, uppercase, lowercase, number &amp; special character</span>
                <span class="field-error" id="passwordError" role="alert"></span>
            </div>

            <button id="signupBtn" type="submit" class="btn" disabled>Create Account</button>
        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="login.html">Login</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/signup.js"></script>

</body>
</html>
